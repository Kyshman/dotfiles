# Timeout for commands executed by starship (ms)
command_timeout = 1000

# newline between commands
add_newline = true

format = """
[ÔûæÔûÆÔûô](#a3aed2)\
(bg:#a3aed2 fg:#090c0c)\
$os\
$username\
$hostname\
[¯é┤](bg:#769ff0 fg:#f2930a)\
$directory\
[¯é┤](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[¯é┤](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[¯é┤](fg:#212736 bg:#1d2230)\
$time\
[¯é┤ ](fg:#1d2230)\
\n$character"""

# You can also replace your username with a neat symbol like ´äá  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bold"
style_root = "bold bg:#769ff0"
format = '[$user]($style)'
disabled = false

[hostname]
ssh_only = true
format = "<[$hostname]($style)>"
#trim_at = "-"
style = "bold dimmed white"
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = false # Disabled by default
format = '[$symbol](bg:#9A348e bold white)'

