#Font to use is Droid Sans Mono Nerd Font Complete Mono found here --> https://eng.m.fontke.com/font/24637081/

# Timeout for commands executed by starship (ms)
command_timeout = 5000

# newline between prompts
# The default value of this option is true, which means that there will be a blank line between each prompt.
add_newline = false

format = """
[¯éÂ](fg:#7DF9AA)\
[$os](bg:#7DF9AA)\
[¯é░](fg:#7DF9AA bg:#1C3A5E)\
$time\
[¯é░](fg:#1C3A5E bg:#314160)\
$username\
$hostname\
[¯é░](fg:#314160 bg:#3B76F0)\
$directory\
[¯é░](fg:#3B76F0 bg:#FCF392)\
$git_branch\
$git_status\
$git_metrics\
[¯é┤](fg:#FCF392)\
\n$character"""

# You can also replace your username with a neat symbol like ´äá  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bold bg:#314160"
style_root = "bold bg:#769ff0"
format = '[$user]($style)'
disabled = false

[hostname]
ssh_only = true
format = "[<$hostname>]($style)"
#trim_at = "-"
style = "bold dimmed bg:#314160"
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
#style = "bg:#9A348E"
disabled = false # Disabled by default
format = '[$symbol](bold)'

